name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is taken from the root package.json `packageManager` field

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # engines.node >= 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 0. Build the workspace packages FIRST. Each @vamp/* package exposes its
      #    public types only through its built `dist/*.d.mts` (the `exports` map
      #    points at `./dist/*.mjs`; there is no source condition or path alias).
      #    Consumers (`@vamp/worker`, `@vamp/solid`, `examples/basic`) import
      #    `@vamp/ecs` etc. via `workspace:*`, so without dist the type-aware
      #    `vp check` and the codegen step below fail with
      #    `TS2307: Cannot find module '@vamp/ecs'`. `-r build` topo-sorts, so
      #    ecs/utils build before worker/solid.
      #
      #    Then re-run install to (re)link workspace bins. The first install ran
      #    with no dist/, so pnpm could not create @vamp/cli's `vamp` bin (its
      #    target `tools/cli/dist/vamp.mjs` did not exist yet — pnpm warns and
      #    skips it), and the build alone does not relink. Without this the
      #    codegen step's `vamp generate` fails with `vamp: not found`.
      - name: Build packages and link workspace bins
        run: |
          pnpm vp run -r build
          pnpm install --frozen-lockfile

      # 1. format + lint + type-check (oxfmt + oxlint typeAware + tsc)
      - name: Check (fmt + lint + typecheck)
        run: pnpm vp check

      # 2. unit test suite — the library packages only (packages/* + tools/*).
      #    The `basic` example app's tests are integration/benchmarks, not units:
      #    `rpc.test.ts` boots a wrangler dev server, and `entity-scale.bench.
      #    test.ts` / `stress.bench.ts` are footprint benchmarks whose heap-delta
      #    assertions are unreliable without `--expose-gc` (they flake in CI) and
      #    belong to `pnpm bench`, not the unit gate. Filtering to the published
      #    packages keeps CI fast and deterministic. NOTE: `--filter` selectors
      #    go BEFORE the task name; the globs are single-quoted so vp (not the
      #    shell) expands them.
      - name: Test (unit)
        run: pnpm vp run --filter './packages/*' --filter './tools/*' test

      # 3. codegen round-trip: regenerate the example and prove the output
      #    still type-checks and is deterministic / committed.
      #    Type-check via `vp check` (NOT bare `tsc`): the example's generated
      #    `bebop.ts` (bebopc output) does not satisfy the bebop runtime's own
      #    types under strict `tsc`, so `vp check` deliberately ignores
      #    `**/bebop.ts` (see `vite.config.ts` fmt/lint ignorePatterns). Bare
      #    `tsc --noEmit` has no such exclusion and fails on generated code the
      #    project owns — and since `bebop.ts` is imported by the other sources,
      #    a tsconfig `exclude` cannot silence it.
      #    Determinism gate excludes `src/bebop.ts`: that file is bebopc output
      #    embedding a `BEBOP_SCHEMA` byte blob whose type order is NOT
      #    reproducible across platforms (bebopc emits in a traversal order that
      #    differs macOS↔Linux — the committed copy is generated on one, CI runs
      #    the other), so a byte-exact `git diff` on it always fails in CI. It is
      #    already excluded from type-checking for the same "tool owns it" reason.
      #    vamp's OWN generated output (`game.generated.ts`, the mutation schema)
      #    IS deterministic and stays gated.
      - name: Codegen round-trip
        run: |
          pnpm --filter basic run generate
          pnpm vp check examples/basic
          git diff --exit-code -- examples/basic/src ':(exclude)examples/basic/src/bebop.ts'

      # 4. publish-readiness / metadata lint: prove every @vamp/* package packs
      #    cleanly (correct `files`, resolvable `exports`, no missing dist).
      #    The old `pnpm run ready` gate was dropped here: it re-ran fmt + lint +
      #    build (already covered by Check + Build above) and, via `vp run -r
      #    test`, the `basic` benchmark suite this workflow deliberately skips.
      - name: Package metadata lint
        run: pnpm --filter "@vamp/*" exec npm pack --dry-run
